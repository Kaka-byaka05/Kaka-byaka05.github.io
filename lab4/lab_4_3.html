<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Оформление вертикального меню</title>
    <style>
        html {
            background: #f0f0f0;
        }

        .menu {
            width: 200px;
            background: #fff;
        }
        .menu ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .menu li a {
            position: relative;
        }
        .menu li:hover ul {
            display: block;
        }
    
        /* При наведении на пункт с подменю: скрываем «плюс», показываем «минус» */
        li:has(ul) > a:hover > .fa-square-plus {
          display: none;
        }
        li:has(ul) > a:hover > .fa-square-minus {
          display: block;
        }    
        .menu li ul {
            display: none;
            position: relative;
            margin-left: 20px;
        }
        .menu > ul > li > a::before {
        }
        .menu li li a::before {
        }
        .menu > ul > li > a {
            padding-left: 10px;
        }
        .menu li li a {
            padding-left: 25px;
        }
    </style>
</head>
<body>
    <nav class="menu">
        <ul>
            <li><a href="#"><i class="menu-icon fa-regular fa-square-plus"></i><i class="menu-icon fa-regular fa-square-minus"></i>Фильмы</a>
                <ul>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Экшн</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Мелодрамы</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Сериалы</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Семейные</a></li>
                </ul>
            </li>
            <li><a href="#"><i class="menu-icon fa-regular fa-square-plus"></i><i class="menu-icon fa-regular fa-square-minus"></i>Музыка</a>
                <ul>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Классика</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Джаз</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Рок</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Грандж</a></li>
                </ul>
            </li>
            <li><a href="#"><i class="menu-icon fa-regular fa-square-plus"></i><i class="menu-icon fa-regular fa-square-minus"></i>Софт</a>
                <ul>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Графика</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>3D-моделирование</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Машинопись</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Переводчики</a></li>
                </ul>
            </li>
            <li><a href="#"><i class="menu-icon fa-regular fa-square-plus"></i><i class="menu-icon fa-regular fa-square-minus"></i>Игры</a>
                <ul>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>РПГ</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Шутеры</a></li>
                    <li><a href="#"><i class="menu-icon fa-regular fa-circle-dot"></i>Пасьянсы</a></li>
                </ul>
            </li>
        </ul>
    </nav>
</body>
</html>
