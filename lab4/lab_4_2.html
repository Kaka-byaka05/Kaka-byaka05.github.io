<!DOCTYPE html>
<html lang="ru">
<head>
		<meta charset="UTF-8">
		<title>Оформление вертикального меню</title>
		<style>
			html {
					background: #f0f0f0;
			}
			
			.menu {
					width: 200px;
					background: #fff;
			}
			
			.menu ul {
          list-style-type: none;
          margin: 0;
          padding: 0;
			}
			
			.menu li {
					position: relative;
			}
			
			.menu li a {
					display: block;
          padding: 10px 20px;
          text-decoration: none;
          color: #333;
          border-left: 5px solid transparent;
			}
			
			.menu li a:hover {
					background-color: #e0e0e0;
          border-left-color: #007bff;
			}
			
			.menu li ul {
					display: none;
          position: absolute;
          left: 100%;
          top: 0;
          margin-top: -1px;
          min-width: 200px;
          background: #fff;
          box-shadow: 0 2px 5px rgba(0,0,0,0.1);
			}
			
			.menu li li {
					padding-left: 10px;
			}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
