<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление вертикального меню</title>
    <style>
        html {
            background: #f0f0f0;
        }
        
        .menu {
            width: 200px;
            background: #fff;
        }
        
        .menu ul {
        }
        
        .menu li {
        }
        
        .menu li a {
        }
        
        .menu li a:hover {
        }
        
        .menu li ul {
        }
        
        .menu li li {
        }
        .menu ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .menu li {
            position: relative;
        }
        .menu li ul {
            display: none;
            position: absolute;
            left: 100%;
            top: 0;
            width: 150px;
            background: #fff;
            border: 1px solid #ccc;
        }

        .menu li:hover > ul {
            display: block;
        }
    </style>
</head>
